# ----------------------------------------------------------
# FRAME INGESTION
# ----------------------------------------------------------
ingestion:
  frame_sample_rate: 4          # Process every Nth frame (3–5 recommended)
  frame_queue_maxsize: 30       # Max frames buffered per camera before dropping
  reconnect_timeout_sec: 10     # Wait before retrying a dropped stream
  health_check_interval_sec: 5  # How often the watchdog checks each stream

# ----------------------------------------------------------
# PREPROCESSING
# ----------------------------------------------------------
# preprocessing:
#   target_width: 640
#   target_height: 640
#   gamma: 1.2                    # >1 brightens dark scenes; <1 darkens bright ones
#   clahe_clip_limit: 2.0         # CLAHE contrast cap (2.0–4.0 typical)
#   clahe_tile_grid_size: [8, 8]  # CLAHE tile grid (smaller = finer local contrast)
#   nlm_h: 4                     # NLM denoising filter strength (higher = more smoothing)
#   nlm_template_window: 5        # NLM template patch size (must be odd)
#   nlm_search_window: 7         # NLM search window size (must be odd)

preprocessing:
  target_width: 640
  target_height: 640
  gamma: 1.2
  clahe_clip_limit: 2.0
  clahe_tile_grid_size: [8, 8]  # Bilateral filter (replaces NLM — much faster, still edge-preserving)
  bilateral_d: 9              # diameter of pixel neighbourhood
  bilateral_sigma_color: 75   # filter sigma in colour space
  bilateral_sigma_space: 75   # filter sigma in coordinate space

# ----------------------------------------------------------
# ROI CALIBRATION
# ----------------------------------------------------------
roi:
  roi_save_path: "data/roi/roi_polygons.json"
  annotation_window_name: "ROI Annotator"
  polygon_color: [0, 255, 0]    # BGR — green
  polygon_thickness: 2

# ----------------------------------------------------------
# DETECTION MODEL
# ----------------------------------------------------------
model:
  weights_path: "models/yolov10x.pt"     # Path to YOLOv10 weights file
  confidence_threshold: 0.45              # Minimum detection confidence
  device: "cuda"                         # "cuda" or "cpu"
  input_size: 640
  iou_threshold: 0.40                    # NMS IoU threshold for duplicate removal

# Seat occupancy classification thresholds
classifier:
  iou_threshold: 0.3             # IoU above this → seat is Occupied
  object_iou_threshold: 0.2             # IoU above this → seat is Reserved

# ----------------------------------------------------------
# TEMPORAL SMOOTHING
# ----------------------------------------------------------
smoothing:
  window_size: 10               # Number of past frames to use for majority vote

# ----------------------------------------------------------
# STORAGE — REDIS (live state)
# ----------------------------------------------------------
redis:
  host: "localhost"
  port: 6379
  db: 0
  password: null                # Set to a string if auth is enabled, else null
  state_ttl_sec: 300            # Seconds before a key auto-expires (safety net)

# ----------------------------------------------------------
# STORAGE — POSTGRESQL + TIMESCALEDB (history)
# ----------------------------------------------------------
database:
  host: "localhost"
  port: 5432
  name: "library_occupancy"
  user: "occupancy_user"
  password: "changeme"          # Change before any deployment
  pool_min: 2
  pool_max: 10

# ----------------------------------------------------------
# API SERVER
# ----------------------------------------------------------
api:
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "http://localhost:3000"   # React dev server
    - "http://localhost:5173"   # Vite dev server (alternative)

# ----------------------------------------------------------
# LOGGING
# ----------------------------------------------------------
logging:
  log_dir: "logs"
  log_level: "INFO"             # DEBUG | INFO | WARNING | ERROR
  max_bytes: 5242880            # 5 MB per log file before rotation
  backup_count: 3               # Keep last 3 rotated files